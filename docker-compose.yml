services:
  agent:
    build: .
    env_file: .env
    expose:
      - "8000"
    restart: unless-stopped

  whatsapp-bridge:
    build: ./whatsapp-bridge
    env_file: .env
    environment:
      - AGENT_URL=http://agent:8000
    ports:
      - "3002:3001"
    volumes:
      - whatsapp_session:/app/.wwebjs_auth
      - ./fotos:/app/fotos:ro
    depends_on:
      - agent
    restart: unless-stopped
    mem_limit: 900m
    memswap_limit: 900m

volumes:
  whatsapp_session:
